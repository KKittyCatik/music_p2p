services:
  node:
    build: .
    image: music_p2p:latest
    container_name: music_p2p_node
    environment:
      - BOOTSTRAP_ADDRS=${BOOTSTRAP_ADDRS:-}
      - NO_MDNS=${NO_MDNS:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ARGS="--listen 4001 --api-port 8080 --metrics-port 9090 --log-level info"
        if [ -n "$$BOOTSTRAP_ADDRS" ]; then ARGS="$$ARGS --bootstrap $$BOOTSTRAP_ADDRS"; fi
        if [ "$$NO_MDNS" = "1" ] || [ "$$NO_MDNS" = "true" ]; then ARGS="$$ARGS --no-mdns"; fi
        exec /app/music_p2p $$ARGS
    ports:
      - "4001:4001"
      - "8080:8080"
      - "9090:9090"
    networks:
      - music_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: music_p2p_prometheus
    profiles:
      - observability
    ports:
      - "9092:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - music_net
    depends_on:
      - node
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: music_p2p_grafana
    profiles:
      - observability
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - music_net
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: music_p2p_loki
    profiles:
      - observability
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - music_net
    restart: unless-stopped

networks:
  music_net:
    driver: bridge

volumes:
  grafana_data:
  loki_data:
