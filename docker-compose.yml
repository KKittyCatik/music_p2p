services:
  node1:
    build: .
    image: music_p2p:latest
    container_name: music_p2p_node1
    command:
      - --listen
      - "4001"
      - --api-port
      - "8080"
      - --metrics-port
      - "9090"
      - --log-level
      - "info"
    ports:
      - "4001:4001"
      - "8080:8080"
      - "9090:9090"
    networks:
      - music_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  node2:
    build: .
    image: music_p2p:latest
    container_name: music_p2p_node2
    command:
      - --listen
      - "4002"
      - --api-port
      - "8081"
      - --metrics-port
      - "9091"
      - --log-level
      - "info"
      - --connect
      - /ip4/node1/tcp/4001
    ports:
      - "4002:4002"
      - "8081:8081"
      - "9091:9091"
    networks:
      - music_net
    depends_on:
      node1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: music_p2p_prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - music_net
    depends_on:
      - node1
      - node2
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: music_p2p_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - music_net
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: music_p2p_loki
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - music_net
    restart: unless-stopped

networks:
  music_net:
    driver: bridge

volumes:
  grafana_data:
  loki_data:
